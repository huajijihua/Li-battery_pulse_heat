<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="topBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#18a3d8"/>
      <stop offset="100%" stop-color="#0f5aa7"/>
    </linearGradient>
    <linearGradient id="footerBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f7dc2"/>
      <stop offset="100%" stop-color="#123a8c"/>
    </linearGradient>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#d62828"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6f42c1"/>
    </marker>
    <marker id="arrow-gold" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#d98e04"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 36px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #ffffff; }
      .panel-title { font: 700 22px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #144c8a; }
      .h1 { font: 700 26px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #1c2635; }
      .h2 { font: 700 18px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #1776bd; }
      .body { font: 500 15px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #233246; }
      .small { font: 500 13px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #5d6c7e; }
      .tiny { font: 500 11px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #5d6c7e; }
      .box { fill: #ffffff; stroke: #213247; stroke-width: 2; rx: 10; ry: 10; }
      .soft { fill: #f7fbff; stroke: #bfd7ea; stroke-width: 1.5; rx: 10; ry: 10; }
      .chip { fill: #eef6fd; stroke: #9fc3df; stroke-width: 1.2; rx: 8; ry: 8; }
      .line { stroke: #253548; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .hv { stroke: #d98e04; stroke-width: 6; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .curr { stroke: #d62828; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-red); }
      .ctrl { stroke: #6f42c1; stroke-width: 2.5; fill: none; stroke-dasharray: 8 7; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-purple); }
      .thin { stroke: #8aa6bf; stroke-width: 1.6; fill: none; }
      .legend { fill: #ffffff; stroke: #d5dfeb; stroke-width: 1.4; rx: 10; ry: 10; }
      .bullet { fill: #1776bd; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="900"/>
  <rect x="0" y="0" width="1600" height="78" fill="url(#topBar)"/>
  <rect x="0" y="850" width="1600" height="50" fill="url(#footerBar)"/>
  <text class="title" x="26" y="50">三支路电池 + 双电机脉冲加热原理示意</text>
  <text class="small" x="24" y="882" fill="#ffffff">说明: 这是帮助理解功能关系的系统原理示意图，不是量产级详细电气原理图。</text>

  <rect class="soft" x="40" y="120" width="520" height="680"/>
  <text class="h1" x="72" y="172">模型说明</text>

  <circle class="bullet" cx="82" cy="230" r="7"/>
  <text class="h2" x="104" y="237">硬件部分</text>
  <line x1="104" y1="252" x2="515" y2="252" stroke="#1b87d1" stroke-width="3"/>
  <text class="body" x="120" y="293">• 三支路电池并联到公共高压母线</text>
  <text class="body" x="120" y="325">• 每条支路具备熔断、接触器、电流采样</text>
  <text class="body" x="120" y="357">• 两台电机控制器分别驱动两台电机</text>

  <circle class="bullet" cx="82" cy="425" r="7"/>
  <text class="h2" x="104" y="432">高压回路</text>
  <line x1="104" y1="447" x2="515" y2="447" stroke="#1b87d1" stroke-width="3"/>
  <text class="body" x="120" y="488">• 上游: 电池支路进入 HVPDU / BDU</text>
  <text class="body" x="120" y="520">• 中间: 主接触器、预充、HVIL、绝缘监测</text>
  <text class="body" x="120" y="552">• 下游: 公共高压母线同时供给两台控制器</text>

  <circle class="bullet" cx="82" cy="620" r="7"/>
  <text class="h2" x="104" y="627">控制部分</text>
  <line x1="104" y1="642" x2="515" y2="642" stroke="#1b87d1" stroke-width="3"/>
  <text class="body" x="120" y="683">• VCU 决定是否进入脉冲加热模式</text>
  <text class="body" x="120" y="715">• BMS 负责电池限流、均流监控、故障切支路</text>
  <text class="body" x="120" y="747">• 双控制器按同频率、同占空比、同相位协同输出</text>

  <rect class="soft" x="605" y="116" width="950" height="690"/>
  <text class="panel-title" x="642" y="160">系统原理图</text>

  <rect class="box" x="665" y="190" width="170" height="84"/>
  <text class="h2" x="750" y="225" text-anchor="middle">BMS</text>
  <text class="small" x="750" y="248" text-anchor="middle">电压 / 电流 / 温度 / SOC</text>
  <text class="small" x="750" y="267" text-anchor="middle">限流 / 均流 / 故障切支路</text>

  <rect class="box" x="930" y="190" width="190" height="84"/>
  <text class="h2" x="1025" y="225" text-anchor="middle">VCU</text>
  <text class="small" x="1025" y="248" text-anchor="middle">模式管理 / 使能条件</text>
  <text class="small" x="1025" y="267" text-anchor="middle">目标电流 / 退出逻辑</text>

  <rect class="box" x="1210" y="190" width="265" height="84"/>
  <text class="h2" x="1342" y="225" text-anchor="middle">脉冲加热策略</text>
  <text class="small" x="1342" y="248" text-anchor="middle">同频率 / 同占空比 / 同相位</text>
  <text class="small" x="1342" y="267" text-anchor="middle">零平均扭矩 + 总电流闭环</text>

  <rect class="box" x="660" y="328" width="140" height="74"/>
  <text class="h2" x="730" y="357" text-anchor="middle">电池支路 1</text>
  <text class="small" x="730" y="380" text-anchor="middle">Battery Branch 1</text>
  <rect class="chip" x="818" y="337" width="72" height="24"/>
  <text class="tiny" x="854" y="353" text-anchor="middle">熔断器</text>
  <rect class="chip" x="900" y="337" width="72" height="24"/>
  <text class="tiny" x="936" y="353" text-anchor="middle">接触器</text>
  <rect class="chip" x="982" y="337" width="72" height="24"/>
  <text class="tiny" x="1018" y="353" text-anchor="middle">电流传感器</text>

  <rect class="box" x="660" y="445" width="140" height="74"/>
  <text class="h2" x="730" y="474" text-anchor="middle">电池支路 2</text>
  <text class="small" x="730" y="497" text-anchor="middle">Battery Branch 2</text>
  <rect class="chip" x="818" y="454" width="72" height="24"/>
  <text class="tiny" x="854" y="470" text-anchor="middle">熔断器</text>
  <rect class="chip" x="900" y="454" width="72" height="24"/>
  <text class="tiny" x="936" y="470" text-anchor="middle">接触器</text>
  <rect class="chip" x="982" y="454" width="72" height="24"/>
  <text class="tiny" x="1018" y="470" text-anchor="middle">电流传感器</text>

  <rect class="box" x="660" y="562" width="140" height="74"/>
  <text class="h2" x="730" y="591" text-anchor="middle">电池支路 3</text>
  <text class="small" x="730" y="614" text-anchor="middle">Battery Branch 3</text>
  <rect class="chip" x="818" y="571" width="72" height="24"/>
  <text class="tiny" x="854" y="587" text-anchor="middle">熔断器</text>
  <rect class="chip" x="900" y="571" width="72" height="24"/>
  <text class="tiny" x="936" y="587" text-anchor="middle">接触器</text>
  <rect class="chip" x="982" y="571" width="72" height="24"/>
  <text class="tiny" x="1018" y="587" text-anchor="middle">电流传感器</text>

  <path class="hv" d="M800 365 H1082 V635 H800"/>
  <path class="hv" d="M800 482 H1082"/>
  <path class="hv" d="M800 599 H1082"/>

  <rect class="box" x="1098" y="400" width="185" height="165"/>
  <text class="h2" x="1190" y="435" text-anchor="middle">HVPDU / BDU</text>
  <text class="small" x="1190" y="462" text-anchor="middle">主接触器 / 预充</text>
  <text class="small" x="1190" y="485" text-anchor="middle">HVIL / 绝缘监测</text>
  <text class="small" x="1190" y="508" text-anchor="middle">高压配电 / 支路切除</text>
  <rect class="chip" x="1125" y="528" width="48" height="20"/>
  <text class="tiny" x="1149" y="542" text-anchor="middle">预充</text>
  <rect class="chip" x="1181" y="528" width="48" height="20"/>
  <text class="tiny" x="1205" y="542" text-anchor="middle">HVIL</text>
  <rect class="chip" x="1237" y="528" width="48" height="20"/>
  <text class="tiny" x="1261" y="542" text-anchor="middle">IMD</text>

  <path class="hv" d="M1283 447 H1380"/>
  <path class="hv" d="M1283 518 H1380"/>
  <text class="small" x="1332" y="435" text-anchor="middle">公共高压母线</text>

  <rect class="box" x="1392" y="360" width="118" height="92"/>
  <text class="h2" x="1451" y="398" text-anchor="middle">控制器 1</text>
  <text class="small" x="1451" y="422" text-anchor="middle">逆变器 / PWM</text>
  <rect class="box" x="1392" y="512" width="118" height="92"/>
  <text class="h2" x="1451" y="550" text-anchor="middle">控制器 2</text>
  <text class="small" x="1451" y="574" text-anchor="middle">逆变器 / PWM</text>

  <line class="line" x1="1510" y1="406" x2="1546" y2="406"/>
  <line class="line" x1="1510" y1="558" x2="1546" y2="558"/>

  <circle cx="1568" cy="406" r="28" fill="#ffffff" stroke="#213247" stroke-width="2"/>
  <circle cx="1568" cy="406" r="15" fill="none" stroke="#f28c00" stroke-width="6"/>
  <text class="tiny" x="1568" y="445" text-anchor="middle">电机 1</text>

  <circle cx="1568" cy="558" r="28" fill="#ffffff" stroke="#213247" stroke-width="2"/>
  <circle cx="1568" cy="558" r="15" fill="none" stroke="#f28c00" stroke-width="6"/>
  <text class="tiny" x="1568" y="597" text-anchor="middle">电机 2</text>

  <path class="ctrl" d="M835 248 H915"/>
  <path class="ctrl" d="M1120 248 H1200"/>
  <path class="ctrl" d="M1025 274 V336 H1451"/>
  <path class="ctrl" d="M1342 274 V494 H1451"/>
  <path class="ctrl" d="M752 274 V365 H972"/>
  <path class="ctrl" d="M752 274 V482 H972"/>
  <path class="ctrl" d="M752 274 V599 H972"/>
  <path class="ctrl" d="M750 274 V390 H1098"/>

  <path class="curr" d="M1020 321 V305 H1380"/>
  <path class="curr" d="M1380 305 V395 H1390"/>
  <path class="curr" d="M1380 305 V547 H1390"/>
  <text class="small" x="1200" y="292" fill="#d62828">脉冲总电流 Ipack</text>

  <path class="curr" d="M1460 320 V286 H1500"/>
  <path class="curr" d="M1460 642 V678 H1500"/>
  <text class="tiny" x="1512" y="290" fill="#d62828">I1(t)</text>
  <text class="tiny" x="1512" y="682" fill="#d62828">I2(t)</text>

  <rect class="legend" x="690" y="704" width="810" height="72"/>
  <line class="hv" x1="720" y1="733" x2="785" y2="733"/>
  <text class="body" x="800" y="739">高压主回路</text>
  <line class="curr" x1="975" y1="733" x2="1040" y2="733"/>
  <text class="body" x="1055" y="739">脉冲电流方向示意</text>
  <line class="ctrl" x1="1265" y1="733" x2="1330" y2="733"/>
  <text class="body" x="1345" y="739">控制/诊断信号</text>

  <text class="small" x="1110" y="790">理解重点: 电池三支路负责供电和分流，双控制器负责把总脉冲电流做出来，BMS / VCU 负责安全边界和控制逻辑。</text>
</svg>
